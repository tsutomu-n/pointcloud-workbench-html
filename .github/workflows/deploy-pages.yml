name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Show Bun version
        run: bun --version

      - name: Run Bun tests
        run: bun test scripts/pointcloud-workbench.test.js scripts/documentation-consistency.test.js scripts/gitignore.test.js scripts/repository-metadata.test.js scripts/public-repo-readiness.test.js scripts/landing-page-i18n.test.js

      - name: Check README
        run: bun scripts/check-readme.js

      - name: Check Server-Zero policy
        run: bun scripts/check-server-zero.js

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare site artifact
        run: |
          mkdir -p site/assets/latest site/assets/v1.0.0 site/demo
          cp index.html site/index.html
          cp PointCloudWorkbench.html site/PointCloudWorkbench.html
          cp _headers site/_headers
          cp _redirects site/_redirects
          cp assets/latest/manifest.json site/assets/latest/manifest.json
          cp assets/v1.0.0/manifest.json site/assets/v1.0.0/manifest.json
          cp demo/pointcloud-demo-sample.las site/demo/pointcloud-demo-sample.las
          touch site/.nojekyll

      - name: Verify Pages artifact
        run: |
          test -f site/index.html
          test -f site/PointCloudWorkbench.html
          test -f site/_headers
          test -f site/_redirects
          test -f site/assets/latest/manifest.json
          test -f site/assets/v1.0.0/manifest.json
          test -f site/demo/pointcloud-demo-sample.las
          test -f site/.nojekyll
          test "$(head -c 4 site/demo/pointcloud-demo-sample.las)" = "LASF"
          grep -q "PointCloudWorkbench" site/index.html
          grep -q "MEASUREMENT_HISTORY_LIMIT" site/PointCloudWorkbench.html
          grep -q "client-max-server-zero" site/assets/latest/manifest.json
          if find site -type f -size +25M | grep -q .; then
            echo "Pages artifact contains files above the 25MiB Cloudflare Pages limit"
            find site -type f -size +25M
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: ${{ 'github-pages' }}
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
