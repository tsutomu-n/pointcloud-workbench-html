name: Diagnostics Smoke

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: diagnostics-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Prepare smoke fixtures
        run: |
          set -euo pipefail
          mkdir -p samples
          cp demo/pointcloud-demo-sample.las samples/test.las
          uv run --with "laspy[lazrs]" python - <<'PY'
          import laspy
          las = laspy.read("samples/test.las")
          las.write("samples/test.laz")
          print("converted samples/test.laz")
          PY

      - name: Install Playwright Chromium
        run: bunx --package playwright playwright install chromium

      - name: Run diagnostics smoke
        run: bunx --package playwright node scripts/e2e/run-diagnostics-smoke.mjs --las samples/test.las --laz samples/test.laz

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-smoke-screenshots
          path: .tmp/e2e/*.png
          if-no-files-found: warn
